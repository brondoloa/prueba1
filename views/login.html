<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Restaurante - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .role-option {
            position: relative;
        }
        
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
        
        .role-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
            text-align: center;
        }
        
        .role-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .role-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .role-text {
            font-size: 12px;
            font-weight: 500;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .alert.success {
            background: #efe;
            color: #363;
            border: 1px solid #cfc;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .demo-credentials {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        
        .demo-credentials h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .demo-credentials div {
            margin-bottom: 5px;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🍽️ TPV Restaurante</h1>
            <p>Sistema de Punto de Venta</p>
        </div>
        
        <form id="loginForm">
            <div class="alert" id="alert"></div>
            
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div class="form-group">
                <label>Tipo de Usuario</label>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="admin" name="expectedRole" value="admin">
                        <label for="admin">
                            <div class="role-icon">👑</div>
                            <div class="role-text">Administrador</div>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="cashier" name="expectedRole" value="cashier" checked>
                        <label for="cashier">
                            <div class="role-icon">💰</div>
                            <div class="role-text">Cajero</div>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="validator" name="expectedRole" value="validator">
                        <label for="validator">
                            <div class="role-icon">✅</div>
                            <div class="role-text">Validador</div>
                        </label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
            
            <div class="loading" id="loading"></div>
        </form>
        
        <div class="demo-credentials">
            <h4>Usuarios de prueba:</h4>
            <div><strong>Admin:</strong> admin / admin123</div>
            <div><strong>Cajero:</strong> cajero / cajero123</div>
            <div><strong>Validador:</strong> validador / validador123</div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loading = document.getElementById('loading');
        const alert = document.getElementById('alert');

        // Verificar si ya está autenticado
        window.addEventListener('load', () => {
            checkAuthStatus();
        });

        function checkAuthStatus() {
            fetch('/api/auth/check')
                .then(response => response.json())
                .then(data => {
                    if (data.authenticated && data.redirectUrl) {
                        window.location.href = data.redirectUrl;
                    }
                })
                .catch(error => {
                    console.log('No authenticated or error checking auth');
                });
        }

        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            loading.style.display = isLoading ? 'block' : 'none';
            loginBtn.textContent = isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(loginForm);
            const username = formData.get('username').trim();
            const password = formData.get('password');
            const expectedRole = formData.get('expectedRole');
            
            if (!username || !password) {
                showAlert('Por favor, complete todos los campos');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Verificar si el rol coincide con el esperado
                    if (expectedRole && data.user.role !== expectedRole) {
                        showAlert(`Este usuario no tiene permisos de ${expectedRole}. Su rol es: ${data.user.role}`);
                        setLoading(false);
                        return;
                    }
                    
                    showAlert('¡Inicio de sesión exitoso! Redirigiendo...', 'success');
                    
                    // Redirigir después de un breve delay
                    setTimeout(() => {
                        window.location.href = data.redirectUrl;
                    }, 1000);
                    
                } else {
                    showAlert(data.error || 'Error de autenticación');
                    setLoading(false);
                }
                
            } catch (error) {
                console.error('Error de login:', error);
                showAlert('Error de conexión. Intente nuevamente.');
                setLoading(false);
            }
        });

        // Funcionalidad para probar credenciales rápidamente
        document.addEventListener('click', (e) => {
            if (e.target.closest('.demo-credentials div')) {
                const text = e.target.textContent;
                const match = text.match(/(\w+) \/ (\w+)/);
                if (match) {
                    document.getElementById('username').value = match[1];
                    document.getElementById('password').value = match[2];
                    
                    // Seleccionar el rol apropiado
                    const role = match[1] === 'admin' ? 'admin' : 
                                match[1] === 'cajero' ? 'cashier' : 'validator';
                    document.getElementById(role).checked = true;
                }
            }
        });

        // Enter en los campos de texto
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
